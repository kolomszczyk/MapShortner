<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="shell-header compact-header">
        <div class="brand-block">
          <span class="brand-kicker">Elrond</span>
          <h1>Podglad wszystkich danych</h1>
          <p>Wszystkie zaimportowane tabele z Accessa w trybie tylko do odczytu, z wyszukiwaniem po rekordach.</p>
        </div>

        <nav class="top-nav">
          <a href="./map.html" data-page-link="map">Mapa i trasy</a>
          <a href="./people.html" data-page-link="people">Osoby</a>
          <a href="./data.html" data-page-link="data">Dane</a>
        </nav>

        <div class="status-ribbon">
          <a class="info-chip utility-link" href="./index.html">Dashboard</a>
          <span class="status-pill" data-updater-status>Oczekiwanie na status aktualizacji...</span>
          <span class="status-pill status-pill-soft" data-operation-status>Brak aktywnej operacji.</span>
        </div>
      </header>

      <main class="panel panel-stack">
        <div class="toolbar-grid">
          <label class="field">
            <span>Tabela</span>
            <select id="table-select"></select>
          </label>

          <label class="field">
            <span>Wyszukaj w wierszach</span>
            <input id="table-search" type="search" placeholder="Szukaj w aktualnej tabeli..." />
          </label>
        </div>

        <div class="table-shell">
          <table class="data-table">
            <thead>
              <tr id="data-table-head"></tr>
            </thead>
            <tbody id="data-table-body"></tbody>
          </table>
        </div>

        <div class="pager-row">
          <button id="prev-page-btn" type="button">Poprzednia</button>
          <span id="pager-info">Strona 1 z 1</span>
          <button id="next-page-btn" type="button">Nastepna</button>
        </div>
      </main>
    </div>

    <script type="module" src="./data.js"></script>
  </body>
</html>
