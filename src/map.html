<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <link
      rel="stylesheet"
      href="./vendor/leaflet/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="./vendor/fontawesome/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="map-page">
    <div class="shell map-shell-sketch">
      <main class="map-workspace">
        <section class="map-board">
          <div class="map-content-group">
            <div class="map-canvas-panel">
              <div id="service-map" class="service-map service-map-sketch" aria-label="Mapa punktow serwisowych"></div>
            </div>

            <aside class="map-info-panel">
              <h1>Informacje</h1>
            </aside>
          </div>

          <aside class="map-settings-rail">
            <div class="map-settings-upper">
              <button class="map-tool-button" type="button" aria-label="Szukaj">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              </button>
              <button class="map-tool-button" type="button" aria-label="Dokument">
                <i class="fa-regular fa-file-lines" aria-hidden="true"></i>
              </button>
            </div>
            <div class="map-settings-lower">
              <button class="settings-gear-button" type="button" aria-label="Ustawienia">
                <i class="fa-solid fa-gear" aria-hidden="true"></i>
              </button>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script type="module" src="./map.js"></script>
  </body>
</html>
