<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elrond - wyszukiwanie trasy | Mapa i trasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="map-page">
    <div class="shell map-shell-sketch">
      <main class="map-workspace">
        <section class="map-board">
          <div class="map-content-group">
            <div class="map-canvas-panel">
              <div id="service-map" class="service-map service-map-sketch" aria-label="Mapa punktow serwisowych"></div>
            </div>

            <aside class="map-info-panel">
              <h1>Informacje</h1>
            </aside>
          </div>

          <aside class="map-settings-rail">
            <button class="settings-gear-button" type="button" aria-label="Ustawienia">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 8.3a3.7 3.7 0 1 0 0 7.4 3.7 3.7 0 0 0 0-7.4Zm9 4.5-1.9-.8a7.6 7.6 0 0 0-.4-1.1l1-1.8-1.9-1.9-1.8 1a7.6 7.6 0 0 0-1.1-.4L13.1 3h-2.2l-.8 1.9a7.6 7.6 0 0 0-1.1.4l-1.8-1-1.9 1.9 1 1.8a7.6 7.6 0 0 0-.4 1.1L3 10.9v2.2l1.9.8c.1.4.2.8.4 1.1l-1 1.8 1.9 1.9 1.8-1c.4.2.8.3 1.1.4l.8 1.9h2.2l.8-1.9c.4-.1.8-.2 1.1-.4l1.8 1 1.9-1.9-1-1.8c.2-.4.3-.8.4-1.1l1.9-.8v-2.2Z"
                />
              </svg>
            </button>
            <span class="settings-rail-label">Ustawienia</span>
          </aside>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./map.js"></script>
  </body>
</html>
